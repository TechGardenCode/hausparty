# Manual-trigger k6 validation suite against hausparty.dev.techgarden.gg.
# Runs three scenarios sequentially in a single container:
#   mixed-traffic → realistic user steady-state (perf measurement)
#   search-spam   → rate-limit validation (asserts 429s fire)
#   admin-flood   → admin auth gate validation (asserts 401s hold)
#
# Apply:   kubectl apply -f loadtests/k8s/job.yaml
# Watch:   kubectl logs -n hausparty -l job-name=hausparty-loadtest-suite -f
# Remove:  kubectl delete -f loadtests/k8s/job.yaml
#
# The ConfigMap below must stay in sync with loadtests/k6/scenarios/*.js.
# Copy updated scripts over before applying.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hausparty-loadtest-scripts
  namespace: hausparty
  labels:
    app.kubernetes.io/name: hausparty
    app.kubernetes.io/component: loadtest
data:
  mixed-traffic.js: |
    import http from "k6/http";
    import { check, sleep } from "k6";
    import { Rate, Trend } from "k6/metrics";

    const BASE_URL = __ENV.BASE_URL || "https://hausparty.dev.techgarden.gg";

    const SEARCH_TERMS = [
      "house", "techno", "deep", "detroit", "minimal",
      "progressive", "acid", "dub", "melodic", "afro",
    ];

    const errors = new Rate("errors");
    const searchDuration = new Trend("search_duration_ms", true);
    const homeDuration = new Trend("home_duration_ms", true);
    const rateLimited = new Rate("rate_limited_429");

    export const options = {
      scenarios: {
        steady: {
          executor: "constant-vus",
          vus: 5,
          duration: "4m",
        },
      },
      thresholds: {
        // 429s from app-layer limiter are expected; thresholds focus on perf.
        http_req_duration: ["p(95)<500", "p(99)<1500"],
        search_duration_ms: ["p(95)<300"],
        errors: ["rate<0.02"],
      },
      summaryTrendStats: ["min", "med", "avg", "p(90)", "p(95)", "p(99)", "max"],
    };

    export default function () {
      const pickSearch = Math.random() < 0.5;
      if (pickSearch) {
        const term = SEARCH_TERMS[Math.floor(Math.random() * SEARCH_TERMS.length)];
        const res = http.get(`${BASE_URL}/api/search?q=${term}`, { tags: { endpoint: "search" } });
        searchDuration.add(res.timings.duration);
        rateLimited.add(res.status === 429);
        const ok = check(res, { "search status 200": (r) => r.status === 200 });
        if (!ok && res.status !== 429) errors.add(1);
      } else {
        const res = http.get(`${BASE_URL}/`, { tags: { endpoint: "home" } });
        homeDuration.add(res.timings.duration);
        rateLimited.add(res.status === 429);
        const ok = check(res, { "home status 200": (r) => r.status === 200 });
        if (!ok && res.status !== 429) errors.add(1);
      }
      sleep(Math.random() * 2 + 2);
    }

  search-spam.js: |
    import http from "k6/http";
    import { check } from "k6";
    import { Rate } from "k6/metrics";

    const BASE_URL = __ENV.BASE_URL || "https://hausparty.dev.techgarden.gg";
    const rateLimited = new Rate("rate_limited_429");
    const allowedThroughLimit = new Rate("allowed_200");

    export const options = {
      scenarios: {
        spam: {
          executor: "constant-arrival-rate",
          rate: 50,
          timeUnit: "1s",
          duration: "30s",
          preAllocatedVUs: 20,
          maxVUs: 30,
        },
      },
      thresholds: {
        rate_limited_429: ["rate>0.8"],
        "http_reqs{expected_response:true}": [],
      },
    };

    export default function () {
      const res = http.get(`${BASE_URL}/api/search?q=spam${__ITER % 10}`);
      rateLimited.add(res.status === 429);
      allowedThroughLimit.add(res.status === 200);
      check(res, {
        "status is 200 or 429": (r) => r.status === 200 || r.status === 429,
        "429 has retry-after header": (r) =>
          r.status !== 429 ||
          !!(r.headers["Retry-After"] || r.headers["retry-after"]),
      });
    }

  admin-flood.js: |
    import http from "k6/http";
    import { check } from "k6";
    import { Rate } from "k6/metrics";

    const BASE_URL = __ENV.BASE_URL || "https://hausparty.dev.techgarden.gg";
    const rejected = new Rate("rejected_401_403");

    export const options = {
      scenarios: {
        flood: {
          executor: "constant-arrival-rate",
          rate: 10,
          timeUnit: "1s",
          duration: "10s",
          preAllocatedVUs: 5,
        },
      },
      thresholds: {
        rejected_401_403: ["rate>0.99"],
        "http_reqs{expected_response:true}": [],
      },
    };

    export default function () {
      const pickProcess = Math.random() < 0.5;
      const path = pickProcess ? "/api/admin/process-submissions" : "/api/admin/refresh-search";
      const res = http.post(`${BASE_URL}${path}`, "{}", { headers: { "content-type": "application/json" } });
      rejected.add(res.status === 401 || res.status === 403);
      check(res, {
        "unauth request rejected": (r) => r.status === 401 || r.status === 403,
        "never returns 200": (r) => r.status !== 200,
        "never returns 5xx": (r) => r.status < 500,
      });
    }

  run-suite.sh: |
    #!/bin/sh
    set +e
    echo "============================================================"
    echo "k6 validation suite against $BASE_URL"
    echo "============================================================"

    echo ""
    echo "=== [1/3] mixed-traffic (realistic steady-state, 4m) ==="
    k6 run --summary-trend-stats min,med,avg,p\(90\),p\(95\),p\(99\),max /scripts/mixed-traffic.js
    MT=$?

    echo ""
    echo "=== [2/3] search-spam (rate-limit validation, 30s) ==="
    k6 run /scripts/search-spam.js
    SS=$?

    echo ""
    echo "=== [3/3] admin-flood (auth gate validation, 10s) ==="
    k6 run /scripts/admin-flood.js
    AF=$?

    echo ""
    echo "============================================================"
    echo "SUITE SUMMARY: mixed-traffic=$MT  search-spam=$SS  admin-flood=$AF"
    echo "(exit 0 = all thresholds passed)"
    echo "============================================================"
    test $MT -eq 0 -a $SS -eq 0 -a $AF -eq 0
---
apiVersion: batch/v1
kind: Job
metadata:
  name: hausparty-loadtest-suite
  namespace: hausparty
  labels:
    app.kubernetes.io/name: hausparty
    app.kubernetes.io/component: loadtest
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hausparty
        app.kubernetes.io/component: loadtest
        job-name: hausparty-loadtest-suite
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 30
      containers:
        - name: k6
          image: grafana/k6:0.58.0
          command: ["sh", "/scripts/run-suite.sh"]
          env:
            - name: BASE_URL
              value: "https://hausparty.dev.techgarden.gg"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: scripts
          configMap:
            name: hausparty-loadtest-scripts
            defaultMode: 0755
